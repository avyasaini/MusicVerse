name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: musicverse.settings_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system packages (Debian/Ubuntu)
        run: |
          set -x
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            libpq-dev \
            ffmpeg \
            libsndfile1 \
            gfortran \
            libatlas-base-dev \
            libblas-dev \
            liblapack-dev \
            libssl-dev \
            pkg-config

      - name: Show Python / pip info (diagnostics)
        run: |
          python -V
          python -c "import sys; print('executable:', sys.executable)"
          pip -V
          pip debug --verbose || true
          which ffmpeg || true
          ffmpeg -version || true

      - name: Install Python tooling and dependencies (with retries)
        run: |
          set -x
          python -m pip install --upgrade pip setuptools wheel
          # try pip install up to 3 times to avoid transient network/timeouts
          n=0
          until [ "$n" -ge 3 ]
          do
            pip install --prefer-binary --no-cache-dir -r requirements.txt && break
            n=$((n+1))
            echo "pip install failed, retrying ($n/3)..."
            sleep 5
          done
          if [ "$n" -ge 3 ]; then
            echo "pip install failed after 3 attempts"; exit 1
          fi
        env:
          PIP_DEFAULT_TIMEOUT: '120'

      - name: Debug: import settings and sys.path
        run: |
          python - <<'PY'
          import importlib, sys, pkgutil, pathlib, os
          print('PYTHON:', sys.version)
          print('CWD:', pathlib.Path('.').resolve())
          print('sys.path:', sys.path)
          print('DJANGO_SETTINGS_MODULE=', os.environ.get('DJANGO_SETTINGS_MODULE'))
          importlib.import_module('musicverse.settings_ci')
          print('Imported musicverse.settings_ci OK')
          PY

      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        run: |
          python manage.py test --verbosity=2
