name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: musicverse.settings_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python tooling and dependencies (simple)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # use prefer-binary to favor wheels over source builds
          pip install --prefer-binary --no-cache-dir -r requirements.txt

      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        run: |
          python manage.py test --verbosity=2
